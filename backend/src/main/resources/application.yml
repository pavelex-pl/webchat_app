server:
  port: 8080
  forward-headers-strategy: native

spring:
  application:
    name: webchat-backend
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 22MB
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/webchat}
    username: ${SPRING_DATASOURCE_USERNAME:webchat}
    password: ${SPRING_DATASOURCE_PASSWORD:webchat}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL_SIZE:30}
      minimum-idle: ${HIKARI_MIN_IDLE:5}
      connection-timeout: 10000
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
    open-in-view: false
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}

webchat:
  jwt:
    secret: ${JWT_SECRET:dev-only-change-me-32-bytes-minimum-xxxxx}
  cookie:
    secure: ${COOKIE_SECURE:false}
  files:
    path: ${FILE_STORAGE_PATH:/data/files}

logging:
  level:
    com.webchat: INFO
