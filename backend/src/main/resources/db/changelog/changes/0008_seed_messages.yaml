databaseChangeLog:
  - changeSet:
      id: 0008-seed-messages
      author: webchat
      comment: "Seed ~5 generic messages per seeded room; 10000 messages in pavlo's default (public-1) chat for scale testing; the most recent message in each room is authored by pavlo."
      changes:
        - sql:
            splitStatements: false
            sql: |
              DO $do$
              DECLARE
                chat_rec        RECORD;
                member_ids      BIGINT[];
                pavlo_id        BIGINT;
                msg_count       INT;
                i               INT;
                author_id       BIGINT;
                msg_body        TEXT;
                base_time       TIMESTAMPTZ := now();
                default_chat_id BIGINT;
                bodies          TEXT[];
                pool_len        INT;
                bulk_count      CONSTANT INT := 10000;
              BEGIN
                CREATE TEMP TABLE msg_pool (body TEXT NOT NULL) ON COMMIT DROP;
                INSERT INTO msg_pool (body) VALUES
                  ('Welcome to the room!'),
                  ('Hey team, what is the plan for today?'),
                  ('Anyone have an update on the project?'),
                  ('Heads up: maintenance window tonight at 22:00.'),
                  ('Quick question about the new rollout.'),
                  ('Ship it.'),
                  ('Reviewing the latest changes now.'),
                  ('Metrics look healthy since the deploy.'),
                  ('Good work everyone, have a great weekend.'),
                  ('Reminder: standup moved to 10:00.');

                SELECT id INTO pavlo_id FROM users WHERE username = 'pavlo';

                SELECT id INTO default_chat_id
                  FROM chats
                 WHERE owner_id = pavlo_id AND name = 'public-1';

                FOR chat_rec IN
                  SELECT id FROM chats
                   WHERE owner_id = pavlo_id
                     AND id <> default_chat_id
                LOOP
                  SELECT array_agg(user_id) INTO member_ids
                    FROM chat_members WHERE chat_id = chat_rec.id;

                  msg_count := 3 + floor(random() * 3)::int;   -- 3..5 messages per room

                  FOR i IN 1..msg_count LOOP
                    SELECT body INTO msg_body FROM msg_pool ORDER BY random() LIMIT 1;

                    IF i = msg_count THEN
                      author_id := pavlo_id;
                    ELSE
                      author_id := member_ids[1 + floor(random() * array_length(member_ids, 1))::int];
                    END IF;

                    INSERT INTO messages (chat_id, author_id, body, created_at)
                         VALUES (chat_rec.id, author_id, msg_body,
                                 base_time - ((msg_count - i) * interval '30 seconds'));
                  END LOOP;
                END LOOP;

                -- Dense backlog for pavlo's default chat: 10000 messages,
                -- last one authored by pavlo, earlier ones by random members.
                bodies   := ARRAY(SELECT body FROM msg_pool);
                pool_len := array_length(bodies, 1);

                SELECT array_agg(user_id) INTO member_ids
                  FROM chat_members WHERE chat_id = default_chat_id;

                INSERT INTO messages (chat_id, author_id, body, created_at)
                SELECT default_chat_id,
                       CASE WHEN s.i = bulk_count
                            THEN pavlo_id
                            ELSE member_ids[1 + floor(random() * array_length(member_ids, 1))::int]
                       END,
                       bodies[1 + floor(random() * pool_len)::int],
                       base_time - ((bulk_count - s.i) * interval '30 seconds')
                  FROM generate_series(1, bulk_count) AS s(i);
              END $do$;
