databaseChangeLog:
  - changeSet:
      id: 0007-pgcrypto
      author: webchat
      changes:
        - sql:
            sql: "CREATE EXTENSION IF NOT EXISTS pgcrypto"

  - changeSet:
      id: 0007-seed-users
      author: webchat
      comment: "Seed pavlo + test1..test10000; password is user123QWERTY! for every user."
      changes:
        - sql:
            splitStatements: false
            sql: |
              DO $do$
              DECLARE
                shared_hash TEXT;
              BEGIN
                -- Compute bcrypt once and reuse for every test user.
                -- At cost 12, 10k individual hashes would take ~40 minutes.
                shared_hash := crypt('user123QWERTY!', gen_salt('bf', 12));

                INSERT INTO users (email, username, password_hash)
                VALUES ('pavlo@webchat.local', 'pavlo',
                        crypt('user123QWERTY!', gen_salt('bf', 12)));

                INSERT INTO users (email, username, password_hash)
                SELECT 'test' || i || '@webchat.local',
                       'test' || i,
                       shared_hash
                FROM generate_series(1, 10000) AS i;
              END $do$;

  - changeSet:
      id: 0007-seed-chats
      author: webchat
      comment: "Seed 1000 public + 1000 private rooms; pavlo is owner; 999 additional random members per room (1000 total)."
      changes:
        - sql:
            splitStatements: false
            sql: |
              DO $do$
              DECLARE
                pavlo_id  BIGINT;
                chat_rec  RECORD;
              BEGIN
                SELECT id INTO pavlo_id FROM users WHERE username = 'pavlo';

                INSERT INTO chats (type, name, description, owner_id)
                SELECT 'PUBLIC_ROOM',
                       'public-' || i,
                       'Seed public room #' || i,
                       pavlo_id
                FROM generate_series(1, 1000) AS i;

                INSERT INTO chats (type, name, description, owner_id)
                SELECT 'PRIVATE_ROOM',
                       'private-' || i,
                       'Seed private room #' || i,
                       pavlo_id
                FROM generate_series(1, 1000) AS i;

                -- Pavlo is OWNER of every seeded room
                INSERT INTO chat_members (chat_id, user_id, role)
                SELECT id, pavlo_id, 'OWNER' FROM chats WHERE owner_id = pavlo_id;

                -- 999 additional random MEMBER rows per room → 1000 total members per room
                FOR chat_rec IN SELECT id FROM chats WHERE owner_id = pavlo_id LOOP
                  INSERT INTO chat_members (chat_id, user_id, role)
                  SELECT chat_rec.id, u.id, 'MEMBER'
                  FROM users u
                  WHERE u.id <> pavlo_id
                  ORDER BY random()
                  LIMIT 999;
                END LOOP;
              END $do$;
