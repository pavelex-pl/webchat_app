databaseChangeLog:
  - changeSet:
      id: 0006-attachments
      author: webchat
      changes:
        - createTable:
            tableName: attachments
            columns:
              - column: { name: id,            type: BIGSERIAL,   constraints: { primaryKey: true, nullable: false } }
              - column: { name: message_id,    type: BIGINT }
              - column: { name: chat_id,       type: BIGINT,      constraints: { nullable: false, foreignKeyName: fk_att_chat, references: "chats(id)", deleteCascade: true } }
              - column: { name: uploader_id,   type: BIGINT }
              - column: { name: original_name, type: TEXT,        constraints: { nullable: false } }
              - column: { name: storage_path,  type: TEXT,        constraints: { nullable: false } }
              - column: { name: mime_type,     type: TEXT,        constraints: { nullable: false } }
              - column: { name: size_bytes,    type: BIGINT,      constraints: { nullable: false } }
              - column: { name: comment,       type: TEXT }
              - column: { name: created_at,    type: TIMESTAMPTZ, defaultValueComputed: "now()", constraints: { nullable: false } }
        - sql:
            sql: "ALTER TABLE attachments ADD CONSTRAINT fk_att_message FOREIGN KEY (message_id) REFERENCES messages(id) ON DELETE CASCADE"
        - sql:
            sql: "ALTER TABLE attachments ADD CONSTRAINT fk_att_uploader FOREIGN KEY (uploader_id) REFERENCES users(id) ON DELETE SET NULL"
        - createIndex:
            tableName: attachments
            indexName: idx_attachments_message
            columns:
              - column: { name: message_id }
        - createIndex:
            tableName: attachments
            indexName: idx_attachments_chat
            columns:
              - column: { name: chat_id }
